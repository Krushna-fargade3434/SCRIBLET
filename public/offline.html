<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Scriblet</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .container {
        background: white;
        border-radius: 20px;
        padding: 40px;
        max-width: 500px;
        width: 100%;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }
      .icon {
        width: 100px;
        height: 100px;
        margin: 0 auto 30px;
        background: #fef3c7;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 50px;
      }
      h1 {
        color: #1f2937;
        font-size: 28px;
        margin-bottom: 15px;
        font-weight: 700;
      }
      p {
        color: #6b7280;
        font-size: 16px;
        line-height: 1.6;
        margin-bottom: 30px;
      }
      .features {
        background: #f9fafb;
        border-radius: 12px;
        padding: 20px;
        margin-top: 30px;
        text-align: left;
      }
      .features h2 {
        color: #374151;
        font-size: 16px;
        margin-bottom: 15px;
        font-weight: 600;
      }
      .features ul {
        list-style: none;
      }
      .features li {
        color: #6b7280;
        padding: 8px 0;
        padding-left: 30px;
        position: relative;
        font-size: 14px;
      }
      .features li:before {
        content: "✓";
        position: absolute;
        left: 0;
        color: #10b981;
        font-weight: bold;
        font-size: 18px;
      }
      button {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 15px 40px;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        width: 100%;
      }
      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
      }
      button:active {
        transform: translateY(0);
      }
      @media (prefers-color-scheme: dark) {
        .container {
          background: #1f2937;
        }
        h1 {
          color: #f9fafb;
        }
        p {
          color: #d1d5db;
        }
        .features {
          background: #374151;
        }
        .features h2 {
          color: #f3f4f6;
        }
        .features li {
          color: #d1d5db;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📵</div>
      <h1>You're Offline</h1>
      <p>
        No internet connection detected. Don't worry, Scriblet works offline too!
        Your previously loaded content is still available.
      </p>
      
      <button onclick="window.location.reload()">Try Again</button>
      
      <div class="features">
        <h2>Available Offline:</h2>
        <ul>
          <li>View previously loaded notes</li>
          <li>Browse cached pages</li>
          <li>Access saved content</li>
          <li>Use all previously loaded features</li>
        </ul>
      </div>
    </div>
    
    <script>
      // Auto-retry when back online
      window.addEventListener('online', () => {
        window.location.reload();
      });
    </script>
  </body>
</html>
